<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>SoundWatch Dashboard</title>

<script src="/socket.io/socket.io.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin: 0;
    background: #0b1830;
    color: white;
    font-family: Arial;
    text-align: center;
}

h1 {
    margin-top: 20px;
}

#dbValue {
    font-size: 70px;
    margin: 20px 0;
}

.meter-container {
    width: 80px;
    height: 250px;
    background: #1f2c44;
    margin: 0 auto 40px;
    border-radius: 15px;
    overflow: hidden;
}

#meter {
    width: 100%;
    height: 0%;
    background: orange;
}

.chart-container {
    width: 90%;
    max-width: 900px;
    margin: auto;
}
</style>
</head>

<body>

<h1>🎧 SoundWatch Dashboard</h1>

<div id="dbValue">0 dB</div>

<div class="meter-container">
    <div id="meter"></div>
</div>

<div class="chart-container">
    <canvas id="dbChart"></canvas>
</div>

<script>
const socket = io();
const dbValue = document.getElementById("dbValue");
const meter = document.getElementById("meter");

const ctx = document.getElementById("dbChart").getContext("2d");

const chart = new Chart(ctx, {
    type: "line",
    data: {
        labels: [],
        datasets: [{
            label: "Decibeles (dB)",
            data: [],
            borderColor: "orange",
            backgroundColor: "rgba(255,165,0,0.2)",
            fill: true,
            tension: 0.3
        }]
    },
    options: {
        animation: false,
        scales: {
            y: {
                min: -90,
                max: 0
            }
        }
    }
});

let time = 2;

socket.on("audioData", (data) => {

    const db = data.db;

    dbValue.textContent = db.toFixed(2) + " dB";

    const percentage = Math.min(Math.abs(db) * 1.5, 100);
    meter.style.height = percentage + "%";

    // Ahora cada punto = 1 segundo
    chart.data.labels.push(time + " s");
    chart.data.datasets[0].data.push(db);
    time++;

    if (chart.data.labels.length > 30) { // mostrar últimos 30 segundos
        chart.data.labels.shift();
        chart.data.datasets[0].data.shift();
    }

    chart.update();
});
</script>

</body>
</html>
