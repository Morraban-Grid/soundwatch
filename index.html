<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Baby Monitor Dashboard</title>
  <style>
    :root {
      --bg: #070d16;
      --panel: #0f1b2d;
      --panel-2: #13243b;
      --text: #e9f2ff;
      --muted: #9db0cb;
      --ok: #1fca7c;
      --red: #e11d48;
      --orange: #f97316;
      --yellow: #facc15;
      --ring: rgba(148, 163, 184, 0.35);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 15%, #1b2a44 0%, transparent 45%),
        radial-gradient(circle at 80% 80%, #0c2b32 0%, transparent 40%),
        var(--bg);
      padding: 16px;
    }

    .wrap {
      max-width: 760px;
      margin: 0 auto;
      display: grid;
      gap: 14px;
    }

    .panel {
      background: linear-gradient(160deg, var(--panel), var(--panel-2));
      border: 1px solid rgba(203, 213, 225, 0.14);
      border-radius: 16px;
      padding: 14px;
      box-shadow: 0 14px 30px rgba(0, 0, 0, 0.35);
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .title {
      margin: 0;
      font-size: 1rem;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      color: #cfe2ff;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.88rem;
      color: var(--muted);
      padding: 6px 10px;
      border: 1px solid rgba(148, 163, 184, 0.25);
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.55);
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: #64748b;
      box-shadow: 0 0 0 0 var(--ring);
      transition: background 0.25s ease;
    }

    .dot.connected { background: var(--ok); }
    .dot.disconnected { background: #ef4444; }

    .alert-card {
      padding: 20px;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(15, 23, 42, 0.75);
      transition: transform 0.2s ease, border-color 0.25s ease, box-shadow 0.25s ease;
      position: relative;
      overflow: hidden;
    }

    .alert-card::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(130deg, rgba(255, 255, 255, 0.12), transparent 60%);
      pointer-events: none;
    }

    .alert-head {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .icon {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      font-size: 1.55rem;
      background: rgba(15, 23, 42, 0.55);
      border: 1px solid rgba(255, 255, 255, 0.16);
    }

    .class-name {
      margin: 0;
      font-size: 1.35rem;
      font-weight: 700;
      line-height: 1.15;
    }

    .confidence {
      margin: 6px 0 0;
      color: #e2e8f0;
      font-size: 1rem;
    }

    .meter {
      margin-top: 14px;
      height: 10px;
      width: 100%;
      border-radius: 999px;
      background: rgba(2, 6, 23, 0.65);
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.09);
    }

    .meter-fill {
      height: 100%;
      width: 0%;
      border-radius: 999px;
      transition: width 0.3s ease;
      background: linear-gradient(90deg, #38bdf8, #22c55e);
    }

    .list-title {
      margin: 0 0 10px;
      font-size: 0.95rem;
      color: #cbd5e1;
      text-transform: uppercase;
      letter-spacing: 0.7px;
    }

    .history {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      gap: 8px;
    }

    .history li {
      padding: 10px 12px;
      border-radius: 10px;
      background: rgba(2, 6, 23, 0.52);
      border: 1px solid rgba(148, 163, 184, 0.18);
      font-size: 0.9rem;
      color: #dbe7fb;
      display: flex;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
    }

    .pulse {
      animation: pulse 0.8s ease-out;
    }

    @keyframes pulse {
      0% {
        transform: scale(1);
        box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.2);
      }
      45% {
        transform: scale(1.02);
        box-shadow: 0 0 0 12px rgba(255, 255, 255, 0);
      }
      100% { transform: scale(1); }
    }

    @media (min-width: 700px) {
      body { padding: 26px; }
      .wrap { gap: 18px; }
      .title { font-size: 1.1rem; }
      .class-name { font-size: 1.7rem; }
      .confidence { font-size: 1.05rem; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="panel topbar">
      <h1 class="title">Baby Monitor Dashboard</h1>
      <div class="status">
        <span id="statusDot" class="dot disconnected"></span>
        <span id="statusText">Desconectado</span>
      </div>
    </section>

    <section id="alertCard" class="panel alert-card">
      <div class="alert-head">
        <div id="alertIcon" class="icon">🩺</div>
        <div>
          <h2 id="className" class="class-name">Esperando datos...</h2>
          <p id="confidenceText" class="confidence">Confianza: 0%</p>
        </div>
      </div>
      <div class="meter">
        <div id="confidenceBar" class="meter-fill"></div>
      </div>
    </section>

    <section class="panel">
      <h3 class="list-title">Últimas 5 alertas</h3>
      <ul id="history" class="history"></ul>
    </section>
  </main>

  <script>
    // Configura tu IP local aquí
    const WS_IP = "192.168.149.189";
    const WS_URL = `ws://${WS_IP}:8000/ws`;

    const statusDot = document.getElementById("statusDot");
    const statusText = document.getElementById("statusText");
    const alertCard = document.getElementById("alertCard");
    const alertIcon = document.getElementById("alertIcon");
    const className = document.getElementById("className");
    const confidenceText = document.getElementById("confidenceText");
    const confidenceBar = document.getElementById("confidenceBar");
    const historyList = document.getElementById("history");

    const alertStyles = {
      baby_cry: { label: "Baby Cry", color: "#e11d48", icon: "👶" },
      loud_noise: { label: "Loud Noise", color: "#f97316", icon: "🔊" },
      impact: { label: "Impact", color: "#facc15", icon: "⚠️" }
    };

    const history = [];
    let socket;

    function setConnection(connected) {
      statusDot.classList.toggle("connected", connected);
      statusDot.classList.toggle("disconnected", !connected);
      statusText.textContent = connected ? "Conectado" : "Desconectado";
    }

    function formatTime(ts) {
      if (!ts) return new Date().toLocaleTimeString();
      const d = new Date(ts);
      if (Number.isNaN(d.getTime())) return String(ts);
      return d.toLocaleTimeString();
    }

    function normalizeConfidence(value) {
      const n = Number(value);
      if (Number.isNaN(n)) return 0;
      if (n <= 1) return Math.max(0, Math.min(100, n * 100));
      return Math.max(0, Math.min(100, n));
    }

    function renderHistory() {
      historyList.innerHTML = "";
      history.forEach((item) => {
        const li = document.createElement("li");
        li.innerHTML = `<span>${item.icon} ${item.label}</span><span>${item.time}</span>`;
        historyList.appendChild(li);
      });
    }

    function renderAlert(data) {
      const style = alertStyles[data.clase] || { label: data.clase || "Unknown", color: "#38bdf8", icon: "📡" };
      const confidence = normalizeConfidence(data.confianza);

      alertIcon.textContent = style.icon;
      className.textContent = style.label;
      confidenceText.textContent = `Confianza: ${confidence.toFixed(1)}%`;
      confidenceBar.style.width = `${confidence}%`;
      confidenceBar.style.background = `linear-gradient(90deg, ${style.color}, #22d3ee)`;
      alertCard.style.borderColor = `${style.color}99`;
      alertCard.style.boxShadow = `0 14px 30px ${style.color}30`;

      history.unshift({ label: style.label, icon: style.icon, time: formatTime(data.timestamp) });
      if (history.length > 5) history.pop();
      renderHistory();

      alertCard.classList.remove("pulse");
      void alertCard.offsetWidth;
      alertCard.classList.add("pulse");
    }

    function connect() {
      socket = new WebSocket(WS_URL);

      socket.onopen = () => setConnection(true);
      socket.onclose = () => {
        setConnection(false);
        setTimeout(connect, 1200);
      };
      socket.onerror = () => setConnection(false);
      socket.onmessage = (event) => {
        try {
          const data = JSON.parse(event.data);
          renderAlert(data);
        } catch (_) {}
      };
    }

    connect();
  </script>
</body>
</html>
